apiVersion: batch/v1
kind: Job
metadata:
  name: hpc-simulation-job
spec:
  template:
    spec:
      containers:
      - name: simulation-node
        image: merinova/hpc-node:latest
        command: ["/bin/sh", "-c"]
        args: ["./run_simulation.sh"]
        resources:
          requests:
            cpu: "2"
            memory: "4Gi"
          limits:
            cpu: "4"
            memory: "8Gi"
      restartPolicy: Never
  backoffLimit: 4
